blank_issues_enabled: false
contact_links:
  - name: Security vulnerability
    url: https://github.com/Rodericuss/bssl-ram/security/advisories/new
    about: Report privately via a GitHub Security Advisory. Do NOT open a public issue for security bugs. See SECURITY.md for details.
  - name: Question or discussion
    url: https://github.com/Rodericuss/bssl-ram/discussions
    about: General questions, design debates, tuning advice, "is this behavior expected?" — use Discussions instead of Issues.
  - name: Read the README first
    url: https://github.com/Rodericuss/bssl-ram#readme
    about: Most "why isn't this compressing X?" questions are answered in Known limitations and Supported apps.
